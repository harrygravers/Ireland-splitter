<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ireland Splitter</title>
<meta name="theme-color" content="#0d1f0f">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" id="pwa-manifest">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1f0f; --bg2: #122614; --bg3: #1a3320; --card: #162b19;
    --border: #2a5030; --green: #3d9b50; --green-light: #52c469;
    --amber: #f0a832; --red: #e05555; --white: #f0ede6; --muted: #7a9b7e;
    --ht: #5b9cf6; --ws: #f97316; --hg: #3d9b50;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--white); font-family: 'Outfit', sans-serif; min-height: 100vh; padding-bottom: 60px; }

  header { background: linear-gradient(135deg, #0a1a0c, #1a3320); padding: 18px 20px 14px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  header h1 { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 900; color: var(--green-light); }
  header p { font-size: 0.73rem; color: var(--muted); margin-top: 2px; }

  .tabs { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 65px; z-index: 99; }
  .tab { flex: 1; padding: 11px 4px; text-align: center; font-size: 0.7rem; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab.active { color: var(--amber); border-bottom-color: var(--amber); background: rgba(240,168,50,0.05); }

  .section { display: none; padding: 16px; }
  .section.active { display: block; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 16px; }
  .card h2 { font-family: 'Fraunces', serif; font-size: 1.05rem; color: var(--amber); margin-bottom: 14px; }

  .field { margin-bottom: 13px; }
  label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
  input[type="text"], input[type="number"], select {
    width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
    color: var(--white); font-family: 'Outfit', sans-serif; font-size: 1rem;
    padding: 11px 13px; outline: none; transition: border-color 0.2s; -webkit-appearance: none;
  }
  input:focus, select:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(61,155,80,0.12); }
  select option { background: #1a3320; }

  .who-row { display: flex; gap: 8px; }
  .who-btn {
    flex: 1; padding: 11px 6px; border-radius: 10px; border: 2px solid var(--border);
    background: var(--bg3); color: var(--muted); font-family: 'Outfit', sans-serif;
    font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: all 0.18s; text-align: center;
  }
  .who-btn.ht.active { border-color: var(--ht); color: var(--ht); background: rgba(91,156,246,0.1); }
  .who-btn.ws.active { border-color: var(--ws); color: var(--ws); background: rgba(249,115,22,0.1); }
  .who-btn.hg.active { border-color: var(--hg); color: var(--hg); background: rgba(61,155,80,0.15); }

  .btn-primary {
    width: 100%; background: linear-gradient(135deg, var(--green), #2d7a40);
    color: white; border: none; border-radius: 12px; padding: 14px;
    font-family: 'Outfit', sans-serif; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: background 0.3s; margin-top: 4px;
  }
  .btn-primary:active { opacity: 0.88; }
  .btn-filter {
    flex: 1; background: var(--bg3); color: var(--muted); border: 1px solid var(--border);
    border-radius: 10px; padding: 9px 6px; font-family: 'Outfit', sans-serif;
    font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-filter.on { color: var(--white); border-color: var(--green); background: rgba(61,155,80,0.12); }

  /* TOAST */
  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(90px);
    background: var(--bg3); border: 1px solid var(--border); border-radius: 14px;
    padding: 12px 20px; font-size: 0.85rem; font-weight: 600; color: var(--white);
    z-index: 500; transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
    opacity: 0; pointer-events: none; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: flex; align-items: center; gap: 10px; max-width: 90vw;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* EXPENSE ITEMS */
  .expense-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .payer-dot { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.82rem; flex-shrink: 0; }
  .payer-dot.ht { background: rgba(91,156,246,0.15); color: var(--ht); border: 1px solid var(--ht); }
  .payer-dot.ws { background: rgba(249,115,22,0.12); color: var(--ws); border: 1px solid var(--ws); }
  .payer-dot.hg { background: rgba(61,155,80,0.12); color: var(--hg); border: 1px solid var(--hg); }
  .exp-info { flex: 1; min-width: 0; }
  .exp-desc { font-size: 0.88rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .exp-meta { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
  .exp-amt { font-size: 0.95rem; font-weight: 700; color: var(--amber); flex-shrink: 0; }
  .ibtn { background: none; border: none; cursor: pointer; padding: 4px; font-size: 1rem; opacity: 0.45; flex-shrink: 0; }
  .ibtn:active { opacity: 1; }

  /* SETTLEMENT */
  .settle-block { border-radius: 16px; padding: 20px; margin-bottom: 16px; }
  .settle-block.pre  { background: rgba(240,168,50,0.05); border: 1px solid rgba(240,168,50,0.35); }
  .settle-block.trip { background: rgba(61,155,80,0.05);  border: 1px solid rgba(61,155,80,0.35); }
  .settle-block h2 { font-family: 'Fraunces', serif; font-size: 1.15rem; margin-bottom: 3px; }
  .settle-block.pre  h2 { color: var(--amber); }
  .settle-block.trip h2 { color: var(--green-light); }
  .settle-sub { font-size: 0.72rem; color: var(--muted); margin-bottom: 16px; }
  .settle-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 8px; margin-top: 14px; }
  .divider { height: 1px; background: var(--border); margin: 14px 0; }

  .tgrid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
  .tbox { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 10px 7px; text-align: center; }
  .tbox-name { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
  .tbox-name.ht { color: var(--ht); } .tbox-name.ws { color: var(--ws); } .tbox-name.hg { color: var(--hg); } .tbox-name.n { color: var(--muted); }
  .tbox-amt { font-size: 0.95rem; font-weight: 700; color: var(--white); }
  .tbox-lbl { font-size: 0.6rem; color: var(--muted); margin-top: 1px; }

  .trf-row { display: flex; align-items: center; background: var(--bg3); border-radius: 10px; padding: 11px 13px; margin-bottom: 7px; gap: 8px; }
  .trf-from, .trf-to { font-size: 0.9rem; font-weight: 700; }
  .trf-arr { color: var(--muted); flex: 1; text-align: center; }
  .trf-amt { font-size: 0.95rem; font-weight: 700; color: var(--amber); margin-left: auto; }

  .grand { text-align: center; padding: 12px 0; }
  .grand-lbl { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
  .grand-amt { font-size: 1.7rem; font-weight: 700; font-family: 'Fraunces', serif; margin-top: 3px; }
  .settle-block.pre  .grand-amt { color: var(--amber); }
  .settle-block.trip .grand-amt { color: var(--green-light); }
  .grand-share { font-size: 0.7rem; color: var(--muted); margin-top: 3px; }

  /* POT */
  .pot-return { background: rgba(61,155,80,0.08); border: 1px solid rgba(61,155,80,0.25); border-radius: 10px; padding: 14px; text-align: center; margin-top: 12px; }
  .pot-return-lbl { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
  .pot-return-amt { font-size: 1.5rem; font-weight: 700; font-family: 'Fraunces', serif; color: var(--green-light); }

  /* EDIT MODAL */
  #edit-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; backdrop-filter: blur(3px); }
  #edit-modal { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 20px 18px 36px; z-index: 201; transform: translateY(100%); transition: transform 0.3s ease; }
  .m-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  #edit-modal h3 { font-family: 'Fraunces', serif; font-size: 1rem; color: var(--amber); margin-bottom: 14px; }

  .s-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 9px; display: flex; align-items: center; gap: 7px; }
  .cpill { background: var(--bg3); border: 1px solid var(--border); color: var(--muted); font-size: 0.62rem; padding: 2px 7px; border-radius: 20px; }
  .empty-s { text-align: center; padding: 30px 0; color: var(--muted); }
  .empty-s .ei { font-size: 2rem; margin-bottom: 8px; }

  @media (max-width: 360px) { .tab { font-size: 0.62rem; } header h1 { font-size: 1.25rem; } }
</style>
</head>
<body>

<header>
  <h1>🍀 Ireland Splitter</h1>
  <p>HT · WS · HG — Mei 2026</p>
</header>

<div class="tabs">
  <div class="tab active"  onclick="showTab('add')">➕ Toevoegen</div>
  <div class="tab"         onclick="showTab('list')">📋 Lijst</div>
  <div class="tab"         onclick="showTab('pot')">🪣 Pot</div>
  <div class="tab"         onclick="showTab('pre')">✈️ Vooraf</div>
  <div class="tab"         onclick="showTab('trip')">🚗 Onderweg</div>
</div>

<!-- TOEVOEGEN -->
<div id="tab-add" class="section active">
  <div class="card">
    <h2>Nieuwe uitgave</h2>
    <div class="field">
      <label>Omschrijving</label>
      <input type="text" id="f-desc" placeholder="bijv. Hotel Galway, Benzine...">
    </div>
    <div class="field">
      <label>Bedrag (€)</label>
      <input type="number" id="f-amount" inputmode="decimal" placeholder="0.00" step="0.01" min="0">
    </div>
    <div class="field">
      <label>Betaald door</label>
      <div class="who-row" id="payer-row">
        <button class="who-btn ht"     onclick="setPayer('HT',this)">HT</button>
        <button class="who-btn ws"     onclick="setPayer('WS',this)">WS</button>
        <button class="who-btn hg active" onclick="setPayer('HG',this)">HG</button>
      </div>
    </div>
    <div class="field">
      <label>Fase</label>
      <select id="f-phase">
        <option value="pre">✈️ Vooraf — voor vertrek</option>
        <option value="trip" selected>🚗 Onderweg — tijdens de reis</option>
      </select>
    </div>
    <button class="btn-primary" id="add-btn" onclick="addExpense()">Toevoegen</button>
  </div>
</div>

<!-- LIJST -->
<div id="tab-list" class="section">
  <div style="display:flex;gap:8px;margin-bottom:14px">
    <button class="btn-filter on" id="f-all"  onclick="setFilter('all')">Alles</button>
    <button class="btn-filter"    id="f-pre"  onclick="setFilter('pre')">✈️ Vooraf</button>
    <button class="btn-filter"    id="f-trip" onclick="setFilter('trip')">🚗 Onderweg</button>
  </div>
  <div id="expense-list"></div>
</div>

<!-- POT -->
<div id="tab-pot" class="section">
  <div class="card">
    <h2>🪣 De Pot</h2>
    <p style="font-size:0.82rem;color:var(--muted);margin-bottom:16px">Iedereen legt hetzelfde in. Na de reis vul je het restant in — de app berekent wat ieder terugkrijgt.</p>
    <div class="field">
      <label>Inleg per persoon (€)</label>
      <input type="number" id="pot-pp" inputmode="decimal" step="10" min="0" placeholder="bijv. 150">
    </div>
    <div class="field">
      <label>Restant na de reis (€) <span style="color:var(--muted);font-weight:400;text-transform:none;font-size:0.75rem">— achteraf invullen</span></label>
      <input type="number" id="pot-rest" inputmode="decimal" step="1" min="0" placeholder="nog niet bekend">
    </div>
    <button class="btn-primary" onclick="savePot()">Opslaan</button>
  </div>
  <div id="pot-status"></div>
</div>

<!-- AFREKENING VOORAF -->
<div id="tab-pre" class="section">
  <div id="settle-pre"></div>
</div>

<!-- AFREKENING ONDERWEG -->
<div id="tab-trip" class="section">
  <div id="settle-trip"></div>
</div>

<!-- EDIT MODAL -->
<div id="edit-overlay" onclick="closeEdit()"></div>
<div id="edit-modal">
  <div class="m-handle"></div>
  <h3>✏️ Bewerken</h3>
  <input type="hidden" id="e-id">
  <div class="field"><label>Omschrijving</label><input type="text" id="e-desc"></div>
  <div class="field"><label>Bedrag (€)</label><input type="number" id="e-amount" inputmode="decimal" step="0.01" min="0"></div>
  <div class="field">
    <label>Betaald door</label>
    <div class="who-row">
      <button class="who-btn ht" id="eb-HT" onclick="setEditPayer('HT')">HT</button>
      <button class="who-btn ws" id="eb-WS" onclick="setEditPayer('WS')">WS</button>
      <button class="who-btn hg" id="eb-HG" onclick="setEditPayer('HG')">HG</button>
    </div>
  </div>
  <div class="field">
    <label>Fase</label>
    <select id="e-phase">
      <option value="pre">✈️ Vooraf — voor vertrek</option>
      <option value="trip">🚗 Onderweg — tijdens de reis</option>
    </select>
  </div>
  <button class="btn-primary" onclick="saveEdit()">Opslaan</button>
</div>

<!-- TOAST -->
<div id="toast">
  <span id="toast-dot" style="width:10px;height:10px;border-radius:50%;flex-shrink:0"></span>
  <span id="toast-msg"></span>
</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────
const COLORS   = { HT:'#5b9cf6', WS:'#f97316', HG:'#3d9b50' };
const NAMES    = { HT:'Harrie',  WS:'Wim',     HG:'Harry'   };
const TAB_IDS  = ['add','list','pot','pre','trip'];

// ── STATE ──────────────────────────────────────────────
let expenses  = JSON.parse(localStorage.getItem('ie_exp')       || '[]');
let potPP     = parseFloat(localStorage.getItem('ie_pot_pp')    || '0');
let potRest   = parseFloat(localStorage.getItem('ie_pot_rest')  || '-1');
let curPayer  = 'HG';
let editPayer = 'HG';
let curFilter = 'all';

// Pre-load known expenses on first run
if (expenses.length === 0) {
  [
    { desc:'Huur auto + WS vliegtickets', amount:572.24, payer:'WS', phase:'pre' },
    { desc:'HG vliegtickets',             amount:823.89, payer:'HG', phase:'pre' },
    { desc:'Hotel Galway',                amount:190,    payer:'HG', phase:'pre' },
    { desc:'Hotel Doolin',                amount:190,    payer:'HG', phase:'pre' },
    { desc:'Hotel Dingle',                amount:560,    payer:'HG', phase:'pre' },
    { desc:'Hotel Trim',                  amount:274,    payer:'HG', phase:'pre' },
    { desc:'Parkeren Schiphol',           amount:110.5,  payer:'HG', phase:'pre' },
  ].forEach((e,i) => expenses.push({ id:Date.now()+i, ...e, date:'Vooraf' }));
  persist();
}

// ── PERSIST ────────────────────────────────────────────
function persist() {
  localStorage.setItem('ie_exp',      JSON.stringify(expenses));
  localStorage.setItem('ie_pot_pp',   potPP.toString());
  localStorage.setItem('ie_pot_rest', potRest.toString());
}

// ── HELPERS ────────────────────────────────────────────
function fmt(n) { return n.toFixed(2).replace('.',','); }

// ── TOAST ──────────────────────────────────────────────
let toastTimer;
function showToast(payer, desc, amount) {
  document.getElementById('toast-dot').style.background = COLORS[payer];
  document.getElementById('toast-msg').textContent = `${NAMES[payer]} voegde € ${fmt(amount)} toe`;
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}

// ── TABS ───────────────────────────────────────────────
function showTab(id) {
  TAB_IDS.forEach((t,i) => {
    document.getElementById('tab-'+t).classList.toggle('active', t===id);
    document.querySelectorAll('.tab')[i].classList.toggle('active', t===id);
  });
  if (id==='list') renderList();
  if (id==='pot')  renderPot();
  if (id==='pre')  renderSettlement('pre');
  if (id==='trip') renderSettlement('trip');
}

// ── PAYER ──────────────────────────────────────────────
function setPayer(p, el) {
  curPayer = p;
  document.querySelectorAll('#payer-row .who-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}
function setEditPayer(p) {
  editPayer = p;
  ['HT','WS','HG'].forEach(x => document.getElementById('eb-'+x).classList.toggle('active', x===p));
}

// ── ADD ────────────────────────────────────────────────
function addExpense() {
  const desc   = document.getElementById('f-desc').value.trim();
  const amount = parseFloat(document.getElementById('f-amount').value);
  const phase  = document.getElementById('f-phase').value;
  if (!desc)                  { alert('Voer een omschrijving in'); return; }
  if (!amount || amount <= 0) { alert('Voer een geldig bedrag in'); return; }

  expenses.push({
    id: Date.now(), desc, amount, payer: curPayer, phase,
    date: new Date().toLocaleDateString('nl-NL',{day:'2-digit',month:'short'})
  });
  persist();

  // Toast notification
  showToast(curPayer, desc, amount);

  // Button feedback
  const btn = document.getElementById('add-btn');
  btn.textContent = `✓ ${NAMES[curPayer]} — € ${fmt(amount)} toegevoegd`;
  btn.style.background = `linear-gradient(135deg, ${COLORS[curPayer]}dd, ${COLORS[curPayer]}99)`;
  setTimeout(() => { btn.textContent = 'Toevoegen'; btn.style.background = ''; }, 2800);

  document.getElementById('f-desc').value   = '';
  document.getElementById('f-amount').value = '';
}

// ── DELETE ─────────────────────────────────────────────
function deleteExpense(id) {
  if (!confirm('Verwijderen?')) return;
  expenses = expenses.filter(e => e.id !== id);
  persist(); renderList();
}

// ── FILTER ─────────────────────────────────────────────
function setFilter(f) {
  curFilter = f;
  ['all','pre','trip'].forEach(x =>
    document.getElementById('f-'+x).classList.toggle('on', x===f));
  renderList();
}

// ── LIST ───────────────────────────────────────────────
function renderList() {
  const c = document.getElementById('expense-list');
  const list = curFilter==='all' ? expenses : expenses.filter(e => e.phase===curFilter);
  if (!list.length) { c.innerHTML = `<div class="empty-s"><div class="ei">🍺</div><p>Nog geen uitgaven.</p></div>`; return; }

  const groups = {};
  list.forEach(e => { (groups[e.phase] = groups[e.phase]||[]).push(e); });
  const labels = { pre:'✈️ Vooraf', trip:'🚗 Onderweg' };
  let html = '';
  for (const [phase, items] of Object.entries(groups)) {
    html += `<div class="s-label">${labels[phase]} <span class="cpill">${items.length}</span></div>`;
    items.slice().reverse().forEach(e => {
      html += `<div class="expense-item">
        <div class="payer-dot ${e.payer.toLowerCase()}">${e.payer}</div>
        <div class="exp-info">
          <div class="exp-desc">${e.desc}</div>
          <div class="exp-meta">${e.date} · ${e.payer}</div>
        </div>
        <div class="exp-amt">€ ${fmt(e.amount)}</div>
        <button class="ibtn" onclick="openEdit(${e.id})">✏️</button>
        <button class="ibtn" onclick="deleteExpense(${e.id})" style="color:var(--red)">✕</button>
      </div>`;
    });
  }
  c.innerHTML = html;
}

// ── EDIT MODAL ─────────────────────────────────────────
function openEdit(id) {
  const e = expenses.find(x => x.id===id); if (!e) return;
  document.getElementById('e-id').value     = id;
  document.getElementById('e-desc').value   = e.desc;
  document.getElementById('e-amount').value = e.amount;
  document.getElementById('e-phase').value  = e.phase;
  editPayer = e.payer;
  ['HT','WS','HG'].forEach(p => document.getElementById('eb-'+p).classList.toggle('active', p===e.payer));
  document.getElementById('edit-overlay').style.display = 'block';
  const m = document.getElementById('edit-modal');
  m.style.display = 'block';
  setTimeout(() => m.style.transform = 'translateY(0)', 10);
}
function closeEdit() {
  const m = document.getElementById('edit-modal');
  m.style.transform = 'translateY(100%)';
  setTimeout(() => { m.style.display='none'; document.getElementById('edit-overlay').style.display='none'; }, 300);
}
function saveEdit() {
  const id     = parseInt(document.getElementById('e-id').value);
  const desc   = document.getElementById('e-desc').value.trim();
  const amount = parseFloat(document.getElementById('e-amount').value);
  const phase  = document.getElementById('e-phase').value;
  if (!desc||!amount||amount<=0) { alert('Controleer de invoer'); return; }
  const i = expenses.findIndex(x => x.id===id);
  if (i>-1) expenses[i] = { ...expenses[i], desc, amount, payer:editPayer, phase };
  persist(); renderList(); closeEdit();
}

// ── POT ────────────────────────────────────────────────
function savePot() {
  const pp = parseFloat(document.getElementById('pot-pp').value);
  if (!pp||pp<=0) { alert('Voer een inleg in'); return; }
  potPP   = pp;
  const rv = document.getElementById('pot-rest').value;
  potRest = rv!=='' ? parseFloat(rv) : -1;
  persist(); renderPot();
}
function renderPot() {
  if (potPP>0) document.getElementById('pot-pp').value = potPP;
  if (potRest>=0) document.getElementById('pot-rest').value = potRest;
  const c = document.getElementById('pot-status');
  if (potPP<=0) { c.innerHTML=`<div class="empty-s"><div class="ei">🪣</div><p>Stel een inleg in.</p></div>`; return; }
  const totaal = potPP*3;
  const rb = potRest>=0;
  c.innerHTML = `
    <div class="card" style="border-left:3px solid var(--amber)">
      <h2>Potstatus</h2>
      <div class="tgrid">
        <div class="tbox"><div class="tbox-name n">Inleg p.p.</div><div class="tbox-amt">€ ${fmt(potPP)}</div><div class="tbox-lbl">per persoon</div></div>
        <div class="tbox"><div class="tbox-name n">Totaal</div><div class="tbox-amt">€ ${fmt(totaal)}</div><div class="tbox-lbl">samen</div></div>
        <div class="tbox"><div class="tbox-name n">Restant</div>
          <div class="tbox-amt" style="color:${rb?'var(--green-light)':'var(--muted)'}">${rb?'€ '+fmt(potRest):'—'}</div>
          <div class="tbox-lbl">na de reis</div>
        </div>
      </div>
      ${rb
        ? `<div class="pot-return"><div class="pot-return-lbl">Ieder krijgt terug</div><div class="pot-return-amt">€ ${fmt(potRest/3)}</div></div>`
        : `<p style="font-size:0.8rem;color:var(--muted);text-align:center;margin-top:10px">Vul het restant in na de reis.</p>`}
    </div>`;
}

// ── SETTLEMENT ENGINE ──────────────────────────────────
function calcSettlement(subset) {
  const people = ['HT','WS','HG'];
  const paid = {HT:0,WS:0,HG:0};
  subset.forEach(e => paid[e.payer] += e.amount);
  const total = paid.HT+paid.WS+paid.HG;
  const share = total/3;
  const bal = {}; people.forEach(p => bal[p] = paid[p]-share);
  const transfers = []; const b = {...bal};
  for (let i=0; i<10; i++) {
    const neg = people.filter(p=>b[p]<-0.005).sort((a,c)=>b[a]-b[c]);
    const pos = people.filter(p=>b[p]> 0.005).sort((a,c)=>b[c]-b[a]);
    if (!neg.length||!pos.length) break;
    const amt = Math.min(-b[neg[0]], b[pos[0]]);
    transfers.push({from:neg[0], to:pos[0], amount:amt});
    b[neg[0]]+=amt; b[pos[0]]-=amt;
  }
  return { paid, total, share, transfers };
}

// ── RENDER SETTLEMENT ──────────────────────────────────
function renderSettlement(phase) {
  const isPre  = phase==='pre';
  const c      = document.getElementById('settle-'+phase);
  const subset = expenses.filter(e=>e.phase===phase);
  const title  = isPre ? '✈️ Afrekening Vooraf' : '🚗 Afrekening Onderweg';
  const sub    = isPre ? 'Kosten voor vertrek — vereffen vóór de reis'
                       : 'Kosten tijdens de reis — vereffen aan het einde';
  const cls    = isPre ? 'pre' : 'trip';

  if (!subset.length) {
    c.innerHTML = `<div class="settle-block ${cls}"><h2>${title}</h2><p class="settle-sub">${sub}</p><div class="empty-s"><div class="ei">${isPre?'✈️':'🚗'}</div><p>Nog geen uitgaven in deze fase.</p></div></div>`;
    return;
  }

  const s = calcSettlement(subset);

  const totalsHTML = ['HT','WS','HG'].map(p=>`
    <div class="tbox">
      <div class="tbox-name ${p.toLowerCase()}">${p}</div>
      <div class="tbox-amt">€ ${fmt(s.paid[p])}</div>
      <div class="tbox-lbl">betaald</div>
    </div>`).join('');

  const trfHTML = s.transfers.length===0
    ? `<p style="color:var(--green-light);font-size:0.88rem;text-align:center;padding:8px 0">✅ Alles vereffend!</p>`
    : s.transfers.map(t=>`
        <div class="trf-row">
          <span class="trf-from" style="color:${COLORS[t.from]}">${t.from}</span>
          <span class="trf-arr">→</span>
          <span class="trf-to" style="color:${COLORS[t.to]}">${t.to}</span>
          <span class="trf-amt">€ ${fmt(t.amount)}</span>
        </div>`).join('');

  const expHTML = subset.slice().reverse().map(e=>`
    <div class="expense-item">
      <div class="payer-dot ${e.payer.toLowerCase()}">${e.payer}</div>
      <div class="exp-info"><div class="exp-desc">${e.desc}</div><div class="exp-meta">${e.date}</div></div>
      <div class="exp-amt">€ ${fmt(e.amount)}</div>
    </div>`).join('');

  c.innerHTML = `
    <div class="settle-block ${cls}">
      <h2>${title}</h2>
      <p class="settle-sub">${sub}</p>

      <div class="settle-label">Totaal betaald</div>
      <div class="tgrid">${totalsHTML}</div>

      <div class="grand">
        <div class="grand-lbl">Totaal ${isPre?'vooraf':'onderweg'}</div>
        <div class="grand-amt">€ ${fmt(s.total)}</div>
        <div class="grand-share">Gelijk aandeel: € ${fmt(s.share)} p.p.</div>
      </div>

      <div class="divider"></div>
      <div class="settle-label">Wie betaalt wie?</div>
      ${trfHTML}

      <div class="divider"></div>
      <div class="settle-label">Alle uitgaven <span class="cpill">${subset.length}</span></div>
      ${expHTML}
    </div>`;
}

// ── INIT ───────────────────────────────────────────────
renderList();
renderPot();
